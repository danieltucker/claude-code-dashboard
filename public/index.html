<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <!-- xterm.js from CDN — the terminal emulator library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay"></div>

  <div id="topbar">
    <button id="hamburger">☰</button>
  </div>
  <div id="sidebar">
    <h2>Sessions</h2>

    <div id="new-session-form">

    <div id="dir-choice">
        <button class="choice-btn active" data-mode="existing">Use Existing</button>
        <button class="choice-btn" data-mode="new">Create New</button>
    </div>

    <div id="existing-dir-panel">
        <select id="dir-select">
        <option value="">Loading...</option>
        </select>
    </div>

    <div id="new-dir-panel" style="display:none">
        <input
        type="text"
        id="new-dir-input"
        placeholder="New folder name"
        />
    </div>

        <button id="create-session-btn">+ New Session</button>
    </div>

    <div id="session-list"></div>
  </div>

  <div id="main">
    <div id="terminals"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
