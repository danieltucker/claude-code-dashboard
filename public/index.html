<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- xterm.js from CDN — the terminal emulator library -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay"></div>

  <div id="topbar">
    <button id="hamburger">☰</button>
  </div>

  <div id="sidebar">
    <h2>Sessions</h2>

    <div id="new-session-form">

      <!-- Default: [dropdown][+] split button -->
      <div id="dir-choice">
        <select id="dir-select"></select>
        <button id="new-btn" title="New project">+</button>
      </div>

      <!-- New project form (shown when + is clicked) -->
      <div id="new-dir-panel" style="display:none">
        <input type="text" id="new-dir-input" placeholder="New project name" />
      </div>

      <button id="create-session-btn">Start Session</button>
      <button id="cancel-new-btn" style="display:none">Cancel</button>
    </div>

    <div id="session-list"></div>
  </div>

  <div id="main">
    <div id="terminals"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
